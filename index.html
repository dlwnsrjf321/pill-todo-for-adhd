<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>오늘의 해야할 일</title><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
 --bg:#f0f0f0;--card:#fff;--border:#d4d4d4;
 --text:#1a1a1a;--muted:#737373;
 --green:#16a34a;--green2:#15803d;
 --orange:#f97316;--orange2:#ea580c;
 --red:#dc2626;
 --r:1.5rem;--rb:.75rem;
 --sh:0 2px 10px rgba(0,0,0,.08);
 --t:.15s ease;
 --cap-w:56px; --cap-h:22px;
}
html{scroll-behavior:smooth}
body{font-family:'Helvetica Neue','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
 background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
button{cursor:pointer;border:none;background:transparent;font-family:inherit}
input{font-family:inherit}
svg{display:block;flex-shrink:0}
#app{display:flex;flex-direction:column;min-height:100vh}
.hdr{position:sticky;top:0;z-index:40;background:rgba(240,240,240,.96);
 backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:.875rem 1rem}
.hdr-in{max-width:900px;margin:0 auto}
.date-nav{display:flex;align-items:center;justify-content:center;gap:1rem}
.nav-btn{width:34px;height:34px;border-radius:50%;color:var(--text);
 display:flex;align-items:center;justify-content:center;transition:background var(--t)}
.nav-btn:hover{background:#e5e5e5}
.date-title{font-size:1.2rem;font-weight:700}
.today-tag{color:var(--green);font-size:.82rem;font-weight:600}
.app-sub{text-align:center;color:var(--muted);font-size:.78rem;margin-top:.2rem}
.main{flex:1;max-width:900px;margin:0 auto;padding:1.5rem 1rem;width:100%}
.blocks{display:flex;flex-direction:column;gap:1.5rem}
.tb{display:flex;flex-direction:column;animation:bIn .3s ease-out}
@media(min-width:768px){.tb{flex-direction:row}}
@keyframes bIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);
 box-shadow:var(--sh);flex:1;display:flex;flex-direction:column;
 min-height:240px;position:relative;overflow:visible;transition:box-shadow var(--t)}
.card.dg{box-shadow:0 0 0 2px var(--green),var(--sh)}
.card.do{box-shadow:0 0 0 2px var(--orange),var(--sh)}
.card.pulsing{animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.ci{display:flex;flex-direction:column;flex:1;padding:1.25rem;
 border-radius:var(--r);position:relative}
.ci.blur{filter:blur(5px);pointer-events:none}
.conn{display:none;width:3rem;align-items:center;justify-content:center;position:relative}
@media(min-width:768px){.conn{display:flex}}
.conn-line{position:absolute;width:100%;height:2px;background:var(--border)}
.conn-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--border)}
.ch{margin-bottom:1rem}
.tl-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.t-btn{font-size:1.15rem;font-weight:700;color:var(--text);padding:0;
 border-bottom:2px dashed transparent;transition:all var(--t)}
.t-btn:hover{color:var(--green);border-bottom-color:var(--green)}
.l-btn{font-size:.78rem;font-weight:500;color:var(--muted);padding:0;transition:color var(--t)}
.l-btn:hover{color:var(--text)}
.c-date{font-size:.68rem;color:#a3a3a3;margin-top:.2rem}
.s-hdr{display:flex;align-items:flex-start;justify-content:space-between}
.s-lbl{font-size:.78rem;font-weight:500;color:var(--muted)}
.l-inp{font-size:.78rem;font-weight:500;font-family:inherit;color:var(--muted);border:none;
 border-bottom:2px solid var(--green);background:transparent;outline:none;width:55px}
.f-btn{display:flex;align-items:center;gap:.3rem;font-size:.7rem;font-weight:500;
 padding:.25rem .55rem;border-radius:999px;background:#f3f4f6;color:var(--muted);
 transition:all var(--t);white-space:nowrap}
.f-btn:hover{background:#e5e7eb}
.f-btn.on{background:var(--green);color:#fff}
.f-btn.on:hover{background:var(--green2)}
.pl{flex:1;display:flex;flex-wrap:wrap;gap:1rem .6rem;
 align-content:flex-start;position:relative;padding:.4rem 0}
.pi{display:flex;align-items:center;gap:.3rem;user-select:none;
 animation:pIn .2s ease-out;position:relative}
.pi.dragging{opacity:.3}
@keyframes pIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.cb{flex-shrink:0;border-radius:4px;border:2px solid #9ca3af;background:transparent;
 display:flex;align-items:center;justify-content:center;transition:all var(--t);
 width:16px;height:16px;padding:0;color:#fff;cursor:pointer}
.cb:hover{border-color:var(--green)}
.cb.g{background:var(--green);border-color:var(--green)}
.cb.o{background:var(--orange);border-color:var(--orange)}
.pw{position:relative;display:flex;align-items:center;cursor:grab;flex-shrink:0}
.pw:active{cursor:grabbing}
.pv{display:flex;align-items:center;transition:transform .16s cubic-bezier(.34,1.56,.64,1);will-change:transform}
.pw:hover .pv{transform:scale(1.13)}
.bd{flex-shrink:0;border-radius:3px;background:var(--red);color:#fff;
 display:flex;align-items:center;justify-content:center;
 transition:all var(--t);padding:0;width:15px;height:15px;
 opacity:0;pointer-events:none}
.pi:hover .bd{opacity:1;pointer-events:auto}
.bd:hover{background:#b91c1c}
.p-cap{width:var(--cap-w);height:var(--cap-h);border-radius:999px;display:flex;overflow:hidden;flex-shrink:0;box-shadow:inset 0 1px 3px rgba(0,0,0,.08);position:relative}
.p-cl{height:100%;width:50%;box-shadow:inset 2px 2px 4px rgba(255,255,255,.35)}
.p-cr{height:100%;width:50%;box-shadow:inset 2px 2px 4px rgba(255,255,255,.5)}
.p-sh{position:absolute;top:4px;left:7px;width:13px;height:4px;background:rgba(255,255,255,.48);border-radius:999px;filter:blur(1px);pointer-events:none}
.cf{margin-top:auto;padding-top:.75rem}
.btn-add{width:100%;padding:.55rem;display:flex;align-items:center;justify-content:center;gap:.4rem;
 border-radius:var(--rb);background:#f3f4f6;color:var(--muted);
 font-size:.82rem;font-weight:500;transition:all var(--t)}
.btn-add:hover{background:#e5e7eb}
.btn-add.or:hover{background:#fff7ed;color:var(--orange)}
.add-form{display:flex;gap:.4rem;flex-wrap:wrap}
.add-in{flex:1;min-width:80px;padding:.42rem .6rem;font-size:.82rem;font-family:inherit;
 border:1px solid #d1d5db;border-radius:var(--rb);background:#f9fafb;outline:none}
.add-in:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(22,163,74,.18)}
.add-in.or:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(249,115,22,.18)}
.btn-ac{padding:.42rem .8rem;border-radius:var(--rb);background:var(--green);color:#fff;
 font-size:.82rem;font-weight:500;transition:background var(--t)}
.btn-ac:hover{background:var(--green2)}
.btn-ac.or{background:var(--orange)}.btn-ac.or:hover{background:var(--orange2)}
.btn-an{padding:.42rem .6rem;border-radius:var(--rb);background:#f3f4f6;color:var(--muted);
 font-size:.82rem;transition:background var(--t)}
.btn-an:hover{background:#e5e7eb}
.btn-ab{width:100%;margin-top:1.5rem;padding:1rem;display:flex;align-items:center;justify-content:center;gap:.5rem;
 border:2px dashed var(--border);border-radius:var(--r);
 color:var(--muted);font-size:.87rem;font-weight:500;transition:all var(--t)}
.btn-ab:hover{border-color:var(--green);color:var(--green)}
.ftr{position:sticky;bottom:0;z-index:40;background:rgba(240,240,240,.96);
 backdrop-filter:blur(10px);border-top:1px solid var(--border);
 padding:.65rem;display:flex;justify-content:center}
.btn-rst{display:flex;align-items:center;gap:.45rem;padding:.45rem 1rem;
 border-radius:999px;color:var(--muted);font-size:.82rem;transition:color var(--t)}
.btn-rst:hover{color:var(--red)}
.cbdg{position:absolute;inset:0;display:flex;align-items:center;
 justify-content:center;z-index:15;pointer-events:none;
 border-radius:var(--r);overflow:hidden}
.cbdg-in{padding:.6rem 1.3rem;border-radius:999px;font-weight:700;font-size:1rem;
 text-align:center;line-height:1.5;animation:bPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes bPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.bg{background:rgba(22,163,74,.9);color:#fff;box-shadow:0 4px 20px rgba(22,163,74,.4)}
.bp{background:linear-gradient(135deg,#7c3aed,#ec4899,#f97316);color:#fff;
 border-radius:1.1rem;box-shadow:0 4px 20px rgba(124,58,237,.4);font-size:.88rem}
.fwc{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:var(--r);z-index:25}
@keyframes fw{0%{transform:translate(0,0) scale(1);opacity:1}
 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
.fo{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;
 align-items:center;justify-content:center;background:rgba(255,255,255,.65);
 backdrop-filter:blur(4px);border-radius:var(--r);gap:.4rem;padding:1rem;text-align:center}
.fo p.m{font-weight:600;color:#374151;font-size:.88rem}
.fo p.s{color:var(--muted);font-size:.76rem}
.btn-sv{display:flex;align-items:center;gap:.3rem;padding:.32rem .7rem;border-radius:999px;
 background:var(--green);color:#fff;font-size:.74rem;font-weight:500;
 margin-top:.3rem;transition:background var(--t)}
.btn-sv:hover{background:var(--green2)}
.mo{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);
 display:flex;align-items:center;justify-content:center;padding:1rem}
.mb{background:#fff;border-radius:var(--r);padding:1.5rem;width:100%;max-width:340px;
 box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s ease-out}
@keyframes mIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.m-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.m-hd h2{font-size:1.05rem;font-weight:700}
.btn-mc{width:28px;height:28px;border-radius:50%;background:#f3f4f6;color:var(--muted);
 display:flex;align-items:center;justify-content:center;transition:background var(--t)}
.btn-mc:hover{background:#e5e7eb}
.m-body{display:flex;flex-direction:column;gap:1rem}
.field{display:flex;flex-direction:column;gap:.35rem}
.field label{font-size:.82rem;font-weight:500}
.m-inp{padding:.6rem .75rem;font-size:.87rem;font-family:inherit;
 border:1px solid #d1d5db;border-radius:var(--rb);background:#fff;outline:none;width:100%}
.m-inp:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(22,163,74,.18)}
.btn-ms{width:100%;padding:.75rem;border-radius:var(--rb);background:var(--green);color:#fff;
 font-size:.87rem;font-weight:500;transition:background var(--t)}
.btn-ms:hover{background:var(--green2)}
</style></head><body><div id="app"></div><script>'use strict';
const StorageService = {
 save(key, data) { try { localStorage.setItem('pill:' + key, JSON.stringify(data)); } catch(e) {} },
 load(key) { try { const r = localStorage.getItem('pill:' + key); return r ? JSON.parse(r) : null; } catch(e) { return null; } },
 remove(key) { try { localStorage.removeItem('pill:' + key); } catch(e) {} }
};
const COLORS = ['pink','orange','blue','green','yellow','red'];
const DAYS = ['일','월','화','수','목','금','토'];
const CS = {
 pink: {cap:['#ec4899','#fbcfe8']},
 orange: {cap:['#f97316','#fed7aa']},
 blue: {cap:['#3b82f6','#bfdbfe']},
 green: {cap:['#22c55e','#bbf7d0']},
 yellow: {cap:['#eab308','#fef9c3']},
 red: {cap:['#ef4444','#fecaca']},
};
const toKey = d => {
 const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
 return y+'-'+m+'-'+dd;
};
const isToday = d => toKey(d) === toKey(new Date());
const fmtFull = d => {
 const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
 return y+'-'+m+'-'+dd+' '+DAYS[d.getDay()]+'요일';
};
const fmtHeader = d => {
 const tag = isToday(d) ? ' <span class="today-tag">(오늘)</span>' : '';
 return (d.getMonth()+1)+'월 '+d.getDate()+'일 '+DAYS[d.getDay()]+'요일'+tag;
};
const to12h = t24 => {
 if (!t24||!t24.includes(':')) return '12:00 PM';
 const [h,m]=t24.split(':').map(Number);
 return (h%12||12)+':'+String(m).padStart(2,'0')+' '+(h>=12?'PM':'AM');
};
const to24h = t12 => {
 const r=t12.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
 if (!r) return '12:00';
 let hh=parseInt(r[1],10);
 if (r[3].toUpperCase()==='PM'&&hh!==12) hh+=12;
 if (r[3].toUpperCase()==='AM'&&hh===12) hh=0;
 return String(hh).padStart(2,'0')+':'+r[2];
};
const S = { date: new Date(), blocks: [], tearing: null, tearTimer: null, modal: false, timeModal: false, timeModalBid: null, drag: null, detail: null };
const rand = a => a[Math.floor(Math.random()*a.length)];
const genId = () => 'p'+Date.now()+Math.random().toString(36).slice(2,6);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const findB = id => S.blocks.find(b=>b.id===id);
const mkBlocks = d => {
 const ds=fmtFull(d);
 return ['아침','점심','저녁'].map((l,i)=>({ id:'b'+i+d.getTime(), time:['9:00 AM','12:00 PM','7:00 PM'][i], label:l, date:ds, capsules:[], tablets:[], focusMode:false }));
};
const nav = d => { S.date=d; const sv=StorageService.load(toKey(d)); S.blocks=(sv&&Array.isArray(sv)&&sv.length)?sv:mkBlocks(d); render(); };
const persist = () => StorageService.save(toKey(S.date), S.blocks);
const icoPlus = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
const icoPencil = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
const icoTrash = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
const icoCheck = '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const icoEye = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
const icoEyeOff = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
const icoReset = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>';
const icoLeft = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
const icoRight = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
const icoX = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
const pillVis = (color) => {
 const cs = CS[color] || CS.pink; const [l, r] = cs.cap;
 return '<div class="p-cap"><div class="p-cl" style="background:linear-gradient(145deg,'+l+' 0%,'+l+' 58%,rgba(0,0,0,.13) 100%)"></div><div class="p-cr" style="background:'+r+'"></div><div class="p-sh"></div></div>';
};
const pillItem = (pill, bid, side) => {
 const isRight = side === 'tablet'; const cbCls = 'cb' + (pill.completed ? ' ' + (isRight ? 'o' : 'g') : ''); const opacity = pill.completed ? 'opacity:.5' : '';
 return '<div class="pi" draggable="true" data-pid="'+pill.id+'" data-bid="'+bid+'" data-side="'+side+'">'
 +'<button class="'+cbCls+'" data-a="complete" data-pid="'+pill.id+'" data-bid="'+bid+'" data-side="'+side+'">'+(pill.completed ? icoCheck : '')+'</button>'
 +'<div class="pw" data-a="show-detail" data-pid="'+pill.id+'" data-bid="'+bid+'" data-side="'+side+'">'
 +'<div class="pv" style="'+opacity+'">'+pillVis(pill.color)+'</div></div>'
 +'<button class="bd" data-a="delete" data-pid="'+pill.id+'" data-bid="'+bid+'" data-side="'+side+'">'+icoTrash+'</button></div>';
};
const blockHTML = b => {
 const lDone = b.capsules.length>0 && b.capsules.every(p=>p.completed); const rDone = b.tablets.length>0 && b.tablets.every(p=>p.completed); const bDone = lDone && rDone; const tear = S.tearing === b.id; const ds = fmtFull(S.date);
 return '<div class="tb" data-bid="'+b.id+'"><div class="card'+(tear?' pulsing':'')+'" data-zone="bag" data-bid="'+b.id+'"><div class="ci"><div class="ch"><div class="tl-row"><button class="t-btn" data-a="edit-time" data-bid="'+b.id+'">'+esc(b.time)+'</button><button class="l-btn" data-a="edit-label" data-bid="'+b.id+'">'+esc(b.label)+'</button></div><div class="c-date">'+ds+'</div></div><div class="pl" data-list="capsule" data-bid="'+b.id+'">'+b.capsules.map(p=>pillItem(p,b.id,'capsule')).join('')+(tear?'<div class="cbdg"><div class="cbdg-in bg">얼렁뚱땅 완료!</div></div>':'')+'</div><div class="cf"><div id="aa-capsule-'+b.id+'"><button class="btn-add" data-a="show-add" data-side="capsule" data-bid="'+b.id+'">'+icoPlus+'할일 추가</button></div></div></div></div><div class="conn"><div class="conn-line"></div><div class="conn-dot"></div></div><div class="card" data-zone="bottle" data-bid="'+b.id+'"><div class="fwc" id="fw-'+b.id+'"></div><div class="ci'+(b.focusMode?' blur':'')+'"><div class="ch"><div class="s-hdr"><div><div class="s-lbl">잡생각 보관함</div><div class="c-date">'+ds+'</div></div><button class="f-btn'+(b.focusMode?' on':'')+'" data-a="toggle-focus" data-bid="'+b.id+'">'+(b.focusMode ? icoEye+'보기' : icoEyeOff+'숨기기')+'</button></div></div><div class="pl" data-list="tablet" data-bid="'+b.id+'">'+b.tablets.map(p=>pillItem(p,b.id,'tablet')).join('')+(bDone?'<div class="cbdg"><div class="cbdg-in bp">진짜 진짜 진짜<br>얼렁뚱땅 완료!</div></div>':'')+'</div><div class="cf"><div id="aa-tablet-'+b.id+'"><button class="btn-add or" data-a="show-add" data-side="tablet" data-bid="'+b.id+'">'+icoPlus+'잡생각 추가</button></div></div></div>'+(b.focusMode?'<div class="fo"><p class="m">오늘은 메인 약에만 집중하세요!</p><p class="s">Focus on your main tasks</p><button class="btn-sv" data-a="toggle-focus" data-bid="'+b.id+'">'+icoEye+'보기</button></div>':'')+'</div></div>';
};
const render = () => {
 const tmoHTML = () => { const b = findB(S.timeModalBid), cur = b ? to24h(b.time) : '12:00'; return '<div class="mo" id="tmo"><div class="mb" id="tmb"><div class="m-hd"><h2>시간대 변경</h2><button class="btn-mc" data-a="close-time-modal">'+icoX+'</button></div><div class="m-body"><div class="field"><label>시간</label><input type="time" id="tmt" value="'+cur+'" class="m-inp"></div><button class="btn-ms" data-a="save-time">저장하기</button></div></div></div>'; };
 const detailModalHTML = () => {
  if(!S.detail) return ''; const {bid, pid, side} = S.detail; const b = findB(bid); if(!b) return '';
  const list = side==='capsule' ? b.capsules : b.tablets; const p = list.find(x=>x.id===pid); if(!p) return '';
  const isCap = side==='capsule'; const cbCls = 'cb ' + (p.completed ? (isCap?'g':'o') : '');
  return '<div class="mo" id="dmo"><div class="mb" id="dmb"><div class="m-hd"><h2>할 일 상세</h2><button class="btn-mc" data-a="close-detail">'+icoX+'</button></div><div class="m-body" style="gap:1.5rem;"><div style="display:flex; gap:.8rem; align-items:flex-start;"><button class="'+cbCls+'" data-a="complete" data-pid="'+p.id+'" data-bid="'+bid+'" data-side="'+side+'">'+(p.completed ? icoCheck : '')+'</button><div style="flex:1; font-size:1rem; font-weight:600; line-height:1.4; word-break:break-all;">'+esc(p.text)+'</div></div><div style="display:flex; flex-direction:column; gap:.6rem;"><button class="btn-ms" style="background:#f3f4f6; color:var(--text); border:1px solid #d1d5db;" data-a="edit-detail" data-pid="'+p.id+'" data-bid="'+bid+'" data-side="'+side+'">수정하기</button><button class="btn-ms" style="background:var(--orange); color:#fff;" data-a="move" data-pid="'+p.id+'" data-bid="'+bid+'" data-side="'+side+'">'+(isCap ? '잡생각 보관함으로 옮기기' : '메인 약봉지로 옮기기')+'</button><button class="btn-ms" style="background:var(--red); color:#fff;" data-a="delete" data-pid="'+p.id+'" data-bid="'+bid+'" data-side="'+side+'">삭제하기</button></div></div></div></div>';
 };
 document.getElementById('app').innerHTML = '<header class="hdr"><div class="hdr-in"><div class="date-nav"><button class="nav-btn" data-a="prev">'+icoLeft+'</button><h1 class="date-title">'+fmtHeader(S.date)+'</h1><button class="nav-btn" data-a="next">'+icoRight+'</button></div><p class="app-sub">오늘의 해야할 일</p></div></header><main class="main"><div class="blocks">'+S.blocks.map(blockHTML).join('')+'</div><button class="btn-ab" data-a="show-modal">'+icoPlus+'시간대 추가</button></main><footer class="ftr"><button class="btn-rst" data-a="reset">'+icoReset+'초기화</button></footer>'
 +(S.modal?'<div class="mo" id="mo"><div class="mb" id="mb"><div class="m-hd"><h2>시간대 추가</h2><button class="btn-mc" data-a="close-modal">'+icoX+'</button></div><div class="m-body"><div class="field"><label>시간</label><input type="time" id="mt" value="12:00" class="m-inp"></div><div class="field"><label>라벨</label><input type="text" id="ml" placeholder="예: 아침, 점심, 저녁..." class="m-inp"></div><button class="btn-ms" data-a="add-block">추가하기</button></div></div></div>':'')+(S.timeModal ? tmoHTML() : '')+detailModalHTML();
 if (S.modal) { const ml = document.getElementById('ml'); if (ml) { ml.focus(); ml.addEventListener('keydown', e=>{ if(e.key==='Enter') doAddBlock(); if(e.key==='Escape'){ S.modal=false; render(); } }); const mt = document.getElementById('mt'); if(mt) mt.addEventListener('keydown', e=>{ if(e.key==='Enter') doAddBlock(); }); document.getElementById('mo').addEventListener('click', e=>{ if(!document.getElementById('mb').contains(e.target)){ S.modal=false; render(); } }); } }
 if (S.timeModal) { const tmt = document.getElementById('tmt'); if(tmt){ tmt.focus(); tmt.addEventListener('keydown', e=>{ if(e.key==='Enter') doSaveTime(); if(e.key==='Escape'){ S.timeModal=false; S.timeModalBid=null; render(); } }); } document.getElementById('tmo').addEventListener('click', e=>{ if(!document.getElementById('tmb').contains(e.target)){ S.timeModal=false; S.timeModalBid=null; render(); } }); }
 if (S.detail) { document.getElementById('dmo').addEventListener('click', e=>{ if(!document.getElementById('dmb').contains(e.target)){ S.detail=null; render(); } }); }
};
const FWC = ['#ec4899','#f97316','#3b82f6','#22c55e','#eab308','#a855f7','#06b6d4','#f43f5e','#facc15'];
const fireworks = bid => { const c = document.getElementById('fw-'+bid); if(!c) return; c.innerHTML = ''; for(let i=0;i<44;i++){ const el = document.createElement('div'); const tx = (Math.random()-.5)*170, ty=-15-Math.random()*135; const dl = Math.random()*.55, dr=.75+Math.random()*.65, sz=4+Math.random()*7; el.style.cssText = 'position:absolute;pointer-events:none;left:'+(5+Math.random()*90)+'%;top:'+(5+Math.random()*70)+'%;width:px;height:px;background:'+FWC[Math.floor(Math.random()*FWC.length)]+';border-radius:'+(Math.random()>.55?'50%':'2px')+';animation:fw '+dr+'s ease-out '+dl+'s forwards;--tx:'+tx+'px;--ty:'+ty+'px;'; el.style.width=sz+'px'; el.style.height=sz+'px'; c.appendChild(el); } setTimeout(()=>{ if(c) c.innerHTML=''; }, 3500); };
const doComplete = (bid, pid, side) => {
 const b = findB(bid); if(!b) return; const pL0 = b.capsules.length>0 && b.capsules.every(p=>p.completed); const pB0 = pL0 && b.tablets.length>0 && b.tablets.every(p=>p.completed); const list = side==='capsule' ? b.capsules : b.tablets; const pill = list.find(p=>p.id===pid); if(!pill) return; pill.completed = !pill.completed; const nL = b.capsules.length>0 && b.capsules.every(p=>p.completed); const nB = nL && b.tablets.length>0 && b.tablets.every(p=>p.completed); if(nL && !pL0){ S.tearing = bid; clearTimeout(S.tearTimer); S.tearTimer = setTimeout(()=>{ S.tearing=null; render(); }, 2200); } else if(!nL && S.tearing===bid){ S.tearing=null; clearTimeout(S.tearTimer); } persist(); render(); if(nB && !pB0) setTimeout(()=>fireworks(bid), 60);
};
const doEditDetail = (bid, pid, side) => {
 const b = findB(bid); if(!b) return; const list = side==='capsule' ? b.capsules : b.tablets; const pill = list.find(p=>p.id===pid); if(!pill) return;
 const newText = prompt('할 일 수정', pill.text); if(newText && newText.trim()){ pill.text = newText.trim(); persist(); render(); }
};
const doDelete = (bid, pid, side) => { const b = findB(bid); if(!b) return; if(side==='capsule') b.capsules = b.capsules.filter(p=>p.id!==pid); else b.tablets = b.tablets.filter(p=>p.id!==pid); S.detail=null; persist(); render(); };
const doMove = (bid, pid, side) => {
 const b = findB(bid); if(!b) return; const sl = side==='capsule' ? b.capsules : b.tablets; const idx = sl.findIndex(p=>p.id===pid); if(idx===-1) return;
 const [p] = sl.splice(idx,1); const target = side==='capsule' ? 'tablet' : 'capsule'; p.type = target; if(target==='capsule') b.capsules.push(p); else b.tablets.push(p); S.detail=null; persist(); render();
};
const doFocus = bid => { const b = findB(bid); if(b){ b.focusMode=!b.focusMode; persist(); render(); } };
const doEditTime = bid => { S.timeModalBid=bid; S.timeModal=true; render(); };
const doSaveTime = () => { const tmt = document.getElementById('tmt'); const b = findB(S.timeModalBid); if(b && tmt && tmt.value){ b.time=to12h(tmt.value); persist(); } S.timeModal=false; S.timeModalBid=null; render(); };
const doEditLabel = bid => {
 const btn = document.querySelector('.l-btn[data-bid="'+bid+'"]'); if(!btn) return; const b = findB(bid); if(!b) return;
 const inp = document.createElement('input'); inp.type='text'; inp.value=b.label; inp.className='l-inp'; btn.replaceWith(inp); inp.focus(); inp.select();
 let done=false; const sv=()=>{ if(done)return; done=true; const t=inp.value.trim(); if(t){b.label=t;persist();} render(); };
 inp.addEventListener('blur',sv); inp.addEventListener('keydown',e=>{ if(e.key==='Enter')sv(); if(e.key==='Escape'){done=true;render();} });
};
const doShowAdd = (bid, side) => {
 const aId = 'aa-'+side+'-'+bid; const area = document.getElementById(aId); if(!area) return; const isM = side==='capsule';
 area.innerHTML = '<div class="add-form"><input type="text" class="add-in'+(isM?'':' or')+'" placeholder="'+(isM?'할일':'잡생각')+' 입력..." id="ai-'+bid+'-'+side+'"><button class="btn-ac'+(isM?'':' or')+'" id="ac-'+bid+'-'+side+'">추가</button><button class="btn-an" id="an-'+bid+'-'+side+'">취소</button></div>';
 const inp = document.getElementById('ai-'+bid+'-'+side); if(!inp) return; inp.focus();
 const resetA = () => { area.innerHTML = '<button class="btn-add'+(isM?'':' or')+'" data-a="show-add" data-side="'+side+'" data-bid="'+bid+'">'+icoPlus+(isM?'할일':'잡생각')+' 추가</button>'; };
 const doAdd = () => { const text = inp.value.trim(); if(!text){resetA();return;} const b = findB(bid); if(!b) return; const pill = {id:genId(), text, shape:'capsule', color:rand(COLORS), completed:false, type:side}; if(side==='capsule') b.capsules.push(pill); else b.tablets.push(pill); persist(); render(); };
 document.getElementById('ac-'+bid+'-'+side).addEventListener('click', doAdd); document.getElementById('an-'+bid+'-'+side).addEventListener('click', resetA); inp.addEventListener('keydown', e=>{ if(e.key==='Enter') doAdd(); if(e.key==='Escape') resetA(); });
};
const doAddBlock = () => {
 const mt = document.getElementById('mt'), ml = document.getElementById('ml'); if(!mt||!ml) return; const label = ml.value.trim(); if(!label) return;
 const block = { id:'b'+Date.now(), time:to12h(mt.value||'12:00'), label, date:fmtFull(S.date), capsules:[], tablets:[], focusMode:false };
 S.blocks.push(block); S.modal=false; persist(); render();
};
document.addEventListener('dragstart', e=>{
 if(e.target.closest('button')||e.target.closest('input')){ e.preventDefault(); return; }
 const row = e.target.closest('.pi'); if(!row) return; S.drag = {pid:row.dataset.pid, sbid:row.dataset.bid, sside:row.dataset.side}; e.dataTransfer.effectAllowed = 'move'; setTimeout(()=>row.classList.add('dragging'), 0);
});
document.addEventListener('dragend', ()=>{ document.querySelectorAll('.pi.dragging').forEach(el=>el.classList.remove('dragging')); document.querySelectorAll('.card.dg,.card.do').forEach(el=>el.classList.remove('dg','do')); });
document.addEventListener('dragover', e=>{ const zone = e.target.closest('[data-zone]'); if(!zone||!S.drag) return; e.preventDefault(); e.dataTransfer.dropEffect='move'; document.querySelectorAll('.card.dg,.card.do').forEach(el=>el.classList.remove('dg','do')); zone.classList.add(zone.dataset.zone==='bag'?'dg':'do'); });
document.addEventListener('dragleave', e=>{ const zone = e.target.closest('[data-zone]'); if(!zone) return; if(!zone.contains(e.relatedTarget)) zone.classList.remove('dg','do'); });
document.addEventListener('drop', e=>{
 e.preventDefault(); const zone = e.target.closest('[data-zone]'); if(!zone||!S.drag) return; zone.classList.remove('dg','do');
 const {pid, sbid, sside} = S.drag; S.drag=null; const tbid = zone.dataset.bid, tzone=zone.dataset.zone; const tside = tzone==='bag' ? 'capsule' : 'tablet'; if(sbid===tbid && sside===tside) return;
 const sb = findB(sbid); if(!sb) return; const sl = sside==='capsule' ? sb.capsules : sb.tablets; const idx = sl.findIndex(p=>p.id===pid); if(idx===-1) return;
 const [pill] = sl.splice(idx,1); pill.type=tside; const tb = findB(tbid); if(!tb){ sl.splice(idx,0,pill); return; } if(tside==='capsule') tb.capsules.push(pill); else tb.tablets.push(pill); persist(); render();
});
document.addEventListener('click', e=>{
 const el = e.target.closest('[data-a]'); if(!el) return; const a = el.dataset.a, bid = el.dataset.bid, pid = el.dataset.pid, side = el.dataset.side;
 switch(a){
  case 'prev': { const d=new Date(S.date); d.setDate(d.getDate()-1); nav(d); break; }
  case 'next': { const d=new Date(S.date); d.setDate(d.getDate()+1); nav(d); break; }
  case 'complete': doComplete(bid,pid,side); break;
  case 'show-detail': S.detail = {bid, pid, side}; render(); break;
  case 'close-detail': S.detail = null; render(); break;
  case 'edit-detail': doEditDetail(bid,pid,side); break;
  case 'move': doMove(bid,pid,side); break;
  case 'delete': doDelete(bid,pid,side); break;
  case 'toggle-focus': doFocus(bid); break;
  case 'edit-time': doEditTime(bid); break;
  case 'close-time-modal': S.timeModal=false; S.timeModalBid=null; render(); break;
  case 'save-time': doSaveTime(); break;
  case 'edit-label': doEditLabel(bid); break;
  case 'show-add': doShowAdd(bid,side); break;
  case 'show-modal': S.modal=true; render(); break;
  case 'close-modal': S.modal=false; render(); break;
  case 'add-block': doAddBlock(); break;
  case 'reset': StorageService.remove(toKey(S.date)); S.blocks=mkBlocks(S.date); S.tearing=null; clearTimeout(S.tearTimer); persist(); render(); break;
 }
});
nav(new Date());</script></body></html>
