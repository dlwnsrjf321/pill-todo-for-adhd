<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시작이 두려운 완벽주의자를 위한 투두리스트</title>
<style>
/* ═══════════════════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f0f0;
  --card:#fff;
  --border:#d4d4d4;
  --text:#1a1a1a;
  --muted:#737373;
  --green:#16a34a;  --green2:#15803d;  --green-t:rgba(22,163,74,.12);
  --orange:#f97316; --orange2:#ea580c; --orange-t:rgba(249,115,22,.12);
  --red:#dc2626;    --red2:#b91c1c;
  --purple:#7c3aed;
  --r:1.5rem; --rb:.75rem;
  --sh:0 2px 12px rgba(0,0,0,.08);
  --sh-lg:0 8px 40px rgba(0,0,0,.18);
  --t:.18s ease;
  --cap-w:56px; --cap-h:22px;
}
html{scroll-behavior:smooth}
body{
  font-family:'Helvetica Neue','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;
  -webkit-tap-highlight-color:transparent;
}
button{cursor:pointer;border:none;background:transparent;font-family:inherit;line-height:1}
input,textarea{font-family:inherit}
svg{display:block;flex-shrink:0}
#app{display:flex;flex-direction:column;min-height:100vh}

/* ═══════════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════════ */
@keyframes fadeIn   {from{opacity:0}to{opacity:1}}
@keyframes slideUp  {from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn    {from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes springIn {from{opacity:0;transform:scale(.72)}to{opacity:1;transform:scale(1)}}
@keyframes blobIn   {0%{transform:scale(0);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes pulse    {0%,100%{opacity:1}50%{opacity:.6}}
@keyframes pillIn   {from{opacity:0;transform:scale(.8) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fabPulse {0%,100%{box-shadow:0 4px 20px rgba(22,163,74,.35)}50%{box-shadow:0 4px 28px rgba(22,163,74,.6)}}
@keyframes hdrIn    {from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tbIn     {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* moved pill */
@keyframes movedBounce{0%{transform:scale(1)}28%{transform:scale(1.32)}55%{transform:scale(.92)}78%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes movedBadge{
  0%  {opacity:0;transform:translateX(-50%) translateY(5px) scale(.8)}
  18% {opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  72% {opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  100%{opacity:0;transform:translateX(-50%) translateY(-7px) scale(.88)}
}
.moved-badge{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--orange);color:#fff;font-size:.66rem;font-weight:700;
  padding:.18rem .52rem;border-radius:999px;white-space:nowrap;
  pointer-events:none;z-index:70;animation:movedBadge 2.1s ease forwards;
  box-shadow:0 2px 10px rgba(249,115,22,.4);
}
.pi.pill-moved .pv{animation:movedBounce .55s cubic-bezier(.34,1.56,.64,1) both}

/* ── Card-center badge overlay ── */
/* 위치 잡기: 카드 전체를 덮는 flex 컨테이너 */
.badge-overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:9999;
}
/* 애니메이션: inner pill 요소에만 적용 → transform 충돌 없음 */
@keyframes badgeEnter{
  0%  { opacity:0; transform:scale(.78) translateY(30px) }
  55% { opacity:1; transform:scale(1.06) translateY(-3px) }
  78% { transform:scale(.97) translateY(1px) }
  100%{ opacity:1; transform:scale(1) translateY(0) }
}
@keyframes badgeExit{
  0%  { opacity:1; transform:scale(1) translateY(0) }
  100%{ opacity:0; transform:scale(.9) translateY(16px) }
}
.badge-inner-anim{
  animation:badgeEnter .52s cubic-bezier(.22,1,.36,1) both;
}
.badge-inner-anim.badge-exit{
  animation:badgeExit .22s ease-in forwards;
}
.badge-pill{
  padding:.72rem 1.8rem;
  border-radius:999px;
  font-weight:800;font-size:1.05rem;
  white-space:nowrap;line-height:1;
  color:#fff;
  display:inline-flex;align-items:center;justify-content:center;gap:.35rem;
  /* 부드러운 그림자로 화면 위에 떠 있는 느낌 */
  box-shadow:0 8px 40px rgba(0,0,0,.22);
  letter-spacing:-.01em;
}
.badge-pill-g{ background:#16a34a; box-shadow:0 8px 36px rgba(22,163,74,.45) }
.badge-pill-p{ background:#16a34a; box-shadow:0 8px 36px rgba(22,163,74,.45) }

/* (centre-badge overlay removed) */

/* ═══════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════ */
.hdr{
  position:sticky;top:0;z-index:40;
  background:rgba(240,240,240,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:.75rem 1rem;
  animation:hdrIn .4s ease-out both;
}
.hdr-in{max-width:900px;margin:0 auto}
.date-nav{display:flex;align-items:center;justify-content:center;gap:.75rem}
.nav-btn{width:34px;height:34px;border-radius:50%;color:var(--text);display:flex;align-items:center;justify-content:center;transition:background var(--t),transform var(--t)}
.nav-btn:hover{background:#e5e5e5}
.nav-btn:active{transform:scale(.88)}
.date-title{font-size:1.15rem;font-weight:700;text-align:center}
.today-tag{color:var(--green);font-size:.8rem;font-weight:600}
.brand-line{text-align:center;margin-top:.3rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.brand-pill-ico{display:inline-flex;align-items:center;width:28px;height:12px;border-radius:999px;overflow:hidden;flex-shrink:0}
.brand-pill-l{width:50%;height:100%;background:#22c55e}
.brand-pill-r{width:50%;height:100%;background:#bbf7d0}
.brand-txt{font-size:.72rem;color:var(--muted);font-weight:500;letter-spacing:-.01em}

/* ═══════════════════════════════════════════════════════
   MAIN / BLOCKS
═══════════════════════════════════════════════════════ */
.main{flex:1;max-width:900px;margin:0 auto;padding:1.25rem 1rem 5rem;width:100%}
.blocks{display:flex;flex-direction:column;gap:1.25rem}
.tb{display:flex;flex-direction:column;animation:tbIn .32s cubic-bezier(.22,1,.36,1) both}
@media(min-width:700px){.tb{flex-direction:row}}

/* ═══════════════════════════════════════════════════════
   CARD
═══════════════════════════════════════════════════════ */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);flex:1;display:flex;flex-direction:column;min-height:200px;position:relative;overflow:visible;transition:box-shadow .2s ease}
.card.dg{box-shadow:0 0 0 2px var(--green),var(--sh)}
.card.do{box-shadow:0 0 0 2px var(--orange),var(--sh)}
.ci{display:flex;flex-direction:column;flex:1;padding:1.1rem 1.1rem .9rem;overflow:hidden;border-radius:var(--r);position:relative}
.ci.blur{filter:blur(5px);pointer-events:none}

.conn{display:none;width:2.5rem;align-items:center;justify-content:center;position:relative;flex-shrink:0}
@media(min-width:700px){.conn{display:flex}}
.conn-line{position:absolute;width:100%;height:2px;background:var(--border)}
.conn-dot{width:10px;height:10px;border-radius:50%;background:var(--border)}

/* ── Card header ── */
.ch{margin-bottom:.85rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.ch-left{flex:1;min-width:0}
.tl-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.t-btn{font-size:1.1rem;font-weight:700;color:var(--text);padding:0;border-bottom:2px dashed transparent;transition:color var(--t),border-color var(--t)}
.t-btn:hover{color:var(--green);border-bottom-color:var(--green)}
.l-btn{font-size:.76rem;font-weight:500;color:var(--muted);padding:0;transition:color var(--t)}
.l-btn:hover{color:var(--text)}
.c-date{font-size:.66rem;color:#a3a3a3;margin-top:.15rem}
.s-lbl{font-size:.76rem;font-weight:500;color:var(--muted)}
.l-inp{font-size:.76rem;font-weight:500;font-family:inherit;color:var(--muted);border:none;border-bottom:2px solid var(--green);background:transparent;outline:none;width:55px}
.ch-actions{display:flex;align-items:center;gap:.3rem;flex-shrink:0}
.f-btn{display:inline-flex;align-items:center;gap:.28rem;font-size:.68rem;font-weight:500;padding:.22rem .5rem;border-radius:999px;background:#f3f4f6;color:var(--muted);transition:background var(--t),color var(--t);white-space:nowrap}
.f-btn:hover{background:#e5e7eb}
.f-btn.on{background:var(--green);color:#fff}
.f-btn.on:hover{background:var(--green2)}
.del-block-btn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#c4c4c4;transition:background var(--t),color var(--t);position:relative;z-index:1}
.del-block-btn svg{pointer-events:none}
.del-block-btn:hover{background:#fee2e2;color:var(--red)}

/* ═══════════════════════════════════════════════════════
   PILL LIST + ITEM
═══════════════════════════════════════════════════════ */
.pl{flex:1;display:flex;flex-wrap:wrap;gap:.85rem .55rem;align-content:flex-start;position:relative;padding:.35rem 0;min-height:40px}
.pi{display:flex;align-items:center;gap:.3rem;user-select:none;position:relative;animation:pillIn .22s cubic-bezier(.34,1.56,.64,1) both}
.pi.dragging{opacity:.3}

.cb{flex-shrink:0;border-radius:4px;border:2px solid #c4c4c4;display:flex;align-items:center;justify-content:center;transition:all var(--t);width:16px;height:16px;padding:0;color:#fff;cursor:pointer}
.cb:hover{border-color:var(--green)}
.cb.g{background:var(--green);border-color:var(--green)}
.cb.o{background:var(--orange);border-color:var(--orange)}

.pw{position:relative;display:flex;align-items:center;cursor:grab;flex-shrink:0}
.pw:active{cursor:grabbing}
/* hover bridge between pill and tooltip */
.pw::after{content:'';position:absolute;left:-18px;right:-18px;bottom:100%;height:13px;background:transparent}
.pv{display:flex;align-items:center;transition:transform .18s cubic-bezier(.34,1.56,.64,1);will-change:transform}
.pw:hover .pv{transform:scale(1.14)}

/* ── Tooltip ── */
.ptip{
  position:absolute;bottom:calc(100% + 10px);
  transform:translateY(6px);
  background:#fff;border:1px solid #e5e7eb;border-radius:11px;
  padding:.38rem .6rem .38rem .55rem;
  display:flex;align-items:center;gap:.35rem;
  white-space:nowrap;opacity:0;pointer-events:none;
  transition:opacity .14s ease,transform .14s ease;
  box-shadow:0 5px 22px rgba(0,0,0,.14);
  z-index:60;min-width:max-content;
}
.ptip::after{content:'';position:absolute;top:100%;left:var(--arr-left,50%);transform:translateX(-50%);border:5px solid transparent;border-top-color:#e5e7eb}
.ptip::before{content:'';position:absolute;top:calc(100% - 1px);left:var(--arr-left,50%);transform:translateX(-50%);border:5px solid transparent;border-top-color:#fff;z-index:1}
.pw:hover .ptip,.pw.tip-open .ptip{opacity:1;pointer-events:auto;transform:translateY(0)}
.ptip-txt{font-size:.8rem;font-weight:500;color:#374151;max-width:170px;overflow:hidden;text-overflow:ellipsis}
.ptip-txt.done{text-decoration:line-through;color:#9ca3af}
.ptip-edit-btn{flex-shrink:0;width:22px;height:22px;border-radius:.35rem;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background var(--t)}
.ptip-edit-btn:hover{background:#f3f4f6;color:var(--text)}
.ptip-inp{font-size:.8rem;font-family:inherit;border:1px solid #d1d5db;border-radius:.45rem;background:#f9fafb;outline:none;padding:.2rem .45rem;width:140px}
.ptip-inp:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(22,163,74,.18)}

.bd{flex-shrink:0;border-radius:3px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;transition:all var(--t);padding:0;width:15px;height:15px;opacity:0;pointer-events:none}
.pi:hover .bd{opacity:1;pointer-events:auto}
.bd:hover{background:var(--red2)}

/* ── Mini confetti container (right card) ── */
.fwc{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:var(--r);z-index:25}
@keyframes mfw{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}

/* ── Capsule shape ── */
.p-cap{width:var(--cap-w);height:var(--cap-h);border-radius:999px;display:flex;overflow:hidden;flex-shrink:0;box-shadow:inset 0 1px 3px rgba(0,0,0,.08);position:relative}
.p-cl{height:100%;width:50%;box-shadow:inset 2px 2px 4px rgba(255,255,255,.35)}
.p-cr{height:100%;width:50%;box-shadow:inset 2px 2px 4px rgba(255,255,255,.5)}
.p-sh{position:absolute;top:4px;left:7px;width:13px;height:4px;background:rgba(255,255,255,.48);border-radius:999px;filter:blur(1px);pointer-events:none}

/* ═══════════════════════════════════════════════════════
   CARD FOOTER / ADD
═══════════════════════════════════════════════════════ */
.cf{margin-top:auto;padding-top:.65rem}
.btn-add{width:100%;padding:.5rem;display:flex;align-items:center;justify-content:center;gap:.38rem;border-radius:var(--rb);background:#f3f4f6;color:var(--muted);font-size:.8rem;font-weight:500;transition:background var(--t),transform var(--t)}
.btn-add:hover{background:#e5e7eb}.btn-add:active{transform:scale(.97)}
.btn-add.or:hover{background:#fff7ed;color:var(--orange)}
.add-form{display:flex;gap:.38rem;flex-wrap:wrap}
.add-in{flex:1;min-width:80px;padding:.4rem .6rem;font-size:.8rem;font-family:inherit;border:1px solid #d1d5db;border-radius:var(--rb);background:#f9fafb;outline:none}
.add-in:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(22,163,74,.18)}
.add-in.or:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(249,115,22,.18)}
.btn-ac{padding:.4rem .75rem;border-radius:var(--rb);background:var(--green);color:#fff;font-size:.8rem;font-weight:500;transition:background var(--t),transform var(--t)}
.btn-ac:hover{background:var(--green2)}.btn-ac:active{transform:scale(.95)}
.btn-ac.or{background:var(--orange)}.btn-ac.or:hover{background:var(--orange2)}
.btn-an{padding:.4rem .6rem;border-radius:var(--rb);background:#f3f4f6;color:var(--muted);font-size:.8rem;transition:background var(--t)}
.btn-an:hover{background:#e5e7eb}

.btn-ab{width:100%;margin-top:1.25rem;padding:.9rem;display:flex;align-items:center;justify-content:center;gap:.45rem;border:2px dashed var(--border);border-radius:var(--r);color:var(--muted);font-size:.85rem;font-weight:500;transition:border-color var(--t),color var(--t),background var(--t),transform var(--t)}
.btn-ab:hover{border-color:var(--green);color:var(--green);background:rgba(22,163,74,.04)}.btn-ab:active{transform:scale(.99)}

.ftr{position:sticky;bottom:0;z-index:40;background:rgba(240,240,240,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:.6rem;display:flex;justify-content:center}
.btn-rst{display:flex;align-items:center;gap:.4rem;padding:.4rem 1rem;border-radius:999px;color:var(--muted);font-size:.8rem;transition:color var(--t),background var(--t)}
.btn-rst:hover{color:var(--red);background:rgba(220,38,38,.06)}

.fo{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.65);backdrop-filter:blur(4px);border-radius:var(--r);gap:.4rem;padding:1rem;text-align:center;animation:fadeIn .2s ease both}
.fo p.m{font-weight:600;color:#374151;font-size:.86rem}
.fo p.s{color:var(--muted);font-size:.74rem}
.btn-sv{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border-radius:999px;background:var(--green);color:#fff;font-size:.74rem;font-weight:500;margin-top:.25rem;transition:background var(--t)}
.btn-sv:hover{background:var(--green2)}

/* ═══════════════════════════════════════════════════════
   MODAL BASE
═══════════════════════════════════════════════════════ */
.mo{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.48);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease both}
@media(min-width:520px){.mo{align-items:center;padding:1rem}}
.mb{background:#fff;border-radius:var(--r) var(--r) 0 0;padding:1.4rem;width:100%;max-width:420px;box-shadow:var(--sh-lg);animation:slideUp .28s cubic-bezier(.22,1,.36,1) both;max-height:92vh;overflow-y:auto}
@media(min-width:520px){.mb{border-radius:var(--r);animation:popIn .24s cubic-bezier(.22,1,.36,1) both}}
.mo-handle{width:40px;height:4px;border-radius:2px;background:#d1d5db;margin:0 auto .9rem;display:block}
@media(min-width:520px){.mo-handle{display:none}}
.m-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.m-hd h2{font-size:1rem;font-weight:700}
.btn-mc{width:28px;height:28px;border-radius:50%;background:#f3f4f6;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:background var(--t),transform var(--t)}
.btn-mc:hover{background:#e5e7eb}.btn-mc:active{transform:scale(.88)}
.m-body{display:flex;flex-direction:column;gap:.9rem}
.field{display:flex;flex-direction:column;gap:.32rem}
.field label{font-size:.8rem;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:.3rem}
.m-inp{padding:.58rem .72rem;font-size:.87rem;font-family:inherit;border:1.5px solid #d1d5db;border-radius:var(--rb);background:#fff;outline:none;width:100%;transition:border-color var(--t),box-shadow var(--t)}
.m-inp:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.14)}
.btn-ms{width:100%;padding:.72rem;border-radius:var(--rb);background:var(--green);color:#fff;font-size:.87rem;font-weight:600;transition:background var(--t),transform var(--t)}
.btn-ms:hover{background:var(--green2)}.btn-ms:active{transform:scale(.98)}

/* ═══════════════════════════════════════════════════════
   PILL DETAIL MODAL  (완료 버튼 없음)
═══════════════════════════════════════════════════════ */
.pill-modal-vis{display:flex;align-items:center;justify-content:center;padding:.75rem 0 .4rem}
.pm-text-box{
  background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:.8rem;
  padding:.7rem .85rem;font-size:.93rem;font-weight:500;color:var(--text);
  word-break:break-all;line-height:1.65;min-height:2.8rem;
  cursor:text;transition:border-color var(--t),box-shadow var(--t);
}
.pm-text-box:hover{border-color:var(--green)}
.pm-text-box.done{text-decoration:line-through;color:#9ca3af}
.pm-edit-hint{font-size:.72rem;color:var(--muted);text-align:center;display:flex;align-items:center;justify-content:center;gap:.25rem}
.pm-edit-inp{width:100%;padding:.62rem .75rem;font-size:.93rem;font-family:inherit;border:1.5px solid var(--green);border-radius:.8rem;background:#fff;outline:none;box-shadow:0 0 0 3px rgba(22,163,74,.14)}
.pm-actions{display:flex;flex-direction:column;gap:.55rem}
.pm-btn{flex:1;padding:.65rem .5rem;border-radius:var(--rb);font-size:.82rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:.38rem;transition:all var(--t)}
.pm-btn:active{transform:scale(.96)}
.pm-btn-move{background:var(--orange-t);color:var(--orange);border:1.5px solid rgba(249,115,22,.25);width:100%}
.pm-btn-move:hover{background:rgba(249,115,22,.2)}
.pm-btn-del{background:rgba(220,38,38,.08);color:var(--red);border:1.5px solid rgba(220,38,38,.2);width:100%}
.pm-btn-del:hover{background:rgba(220,38,38,.16)}

/* ═══════════════════════════════════════════════════════
   CUSTOM CONFIRM MODAL
═══════════════════════════════════════════════════════ */
.confirm-mb{max-width:320px}
.confirm-msg{font-size:.88rem;line-height:1.6;color:#374151;padding:.2rem 0 .9rem;white-space:pre-line}
.confirm-row{display:flex;gap:.5rem}
.confirm-ok{flex:1;padding:.65rem;border-radius:var(--rb);background:var(--red);color:#fff;font-size:.85rem;font-weight:600;transition:background var(--t),transform var(--t)}
.confirm-ok:hover{background:var(--red2)}.confirm-ok:active{transform:scale(.96)}
.confirm-cancel{flex:1;padding:.65rem;border-radius:var(--rb);background:#f3f4f6;color:var(--muted);font-size:.85rem;font-weight:600;transition:background var(--t)}
.confirm-cancel:hover{background:#e5e7eb}

/* ═══════════════════════════════════════════════════════
   GUIDE MODAL
═══════════════════════════════════════════════════════ */
.guide-hero{text-align:center;padding:.5rem 0 .75rem;display:flex;flex-direction:column;align-items:center;gap:.55rem}
.guide-pills{display:flex;gap:.4rem;align-items:center;justify-content:center}
.guide-pill-item{display:flex;flex-direction:column;align-items:center;gap:.25rem;font-size:.64rem;color:var(--muted)}
.guide-steps{display:flex;flex-direction:column;gap:.6rem}
.guide-step{display:flex;align-items:flex-start;gap:.65rem;background:#f9fafb;border-radius:.85rem;padding:.65rem .75rem;border:1px solid #f0f0f0;animation:slideUp .3s ease both}
.guide-step:nth-child(2){animation-delay:.06s}.guide-step:nth-child(3){animation-delay:.12s}.guide-step:nth-child(4){animation-delay:.18s}
.guide-step-ico{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.guide-step-ico.g{background:rgba(22,163,74,.12);color:var(--green)}
.guide-step-ico.o{background:rgba(249,115,22,.12);color:var(--orange)}
.guide-step-ico.p{background:rgba(124,58,237,.12);color:var(--purple)}
.guide-step-ico.b{background:rgba(59,130,246,.12);color:#3b82f6}
.guide-step-txt h3{font-size:.83rem;font-weight:700;margin-bottom:.12rem}
.guide-step-txt p{font-size:.76rem;color:var(--muted);line-height:1.5}
.guide-close-btn{width:100%;padding:.7rem;border-radius:var(--rb);background:var(--green);color:#fff;font-size:.87rem;font-weight:600;transition:background var(--t);margin-top:.3rem}
.guide-close-btn:hover{background:var(--green2)}

/* ═══════════════════════════════════════════════════════
   FAB
═══════════════════════════════════════════════════════ */
.fab{position:fixed;bottom:4rem;right:1.1rem;z-index:45;width:48px;height:48px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(22,163,74,.38);transition:transform var(--t),box-shadow var(--t);animation:fabPulse 2.8s ease-in-out 1.5s infinite,springIn .5s cubic-bezier(.34,1.56,.64,1) .6s both}
.fab svg{pointer-events:none}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(22,163,74,.5);animation:none}
.fab:active{transform:scale(.92)}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   STORAGE SERVICE
═══════════════════════════════════════════════════════ */
const StorageService={
  save(key,data) { try{localStorage.setItem('pill:'+key,JSON.stringify(data));}catch(e){} },
  load(key)      { try{const r=localStorage.getItem('pill:'+key);return r?JSON.parse(r):null;}catch(e){return null;} },
  remove(key)    { try{localStorage.removeItem('pill:'+key);}catch(e){} },
};

/* ═══════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════ */
const COLORS=['pink','orange','blue','green','yellow','red'];
const DAYS  =['일','월','화','수','목','금','토'];
const CS={
  pink:  {cap:['#ec4899','#fbcfe8']},
  orange:{cap:['#f97316','#fed7aa']},
  blue:  {cap:['#3b82f6','#bfdbfe']},
  green: {cap:['#22c55e','#bbf7d0']},
  yellow:{cap:['#eab308','#fef9c3']},
  red:   {cap:['#ef4444','#fecaca']},
};

/* ═══════════════════════════════════════════════════════
   DATE UTILS
═══════════════════════════════════════════════════════ */
const toKey   =d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd};
const isToday =d=>toKey(d)===toKey(new Date());
const fmtFull =d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd+' '+DAYS[d.getDay()]+'요일'};
const fmtHdr  =d=>{const tag=isToday(d)?' <span class="today-tag">(오늘)</span>':'';return (d.getMonth()+1)+'월 '+d.getDate()+'일 '+DAYS[d.getDay()]+'요일'+tag};
const to12h   =t24=>{if(!t24||!t24.includes(':'))return'12:00 PM';const[h,m]=t24.split(':').map(Number);return (h%12||12)+':'+String(m).padStart(2,'0')+' '+(h>=12?'PM':'AM')};
const to24h   =t12=>{const r=t12.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);if(!r)return'12:00';let hh=parseInt(r[1],10);if(r[3].toUpperCase()==='PM'&&hh!==12)hh+=12;if(r[3].toUpperCase()==='AM'&&hh===12)hh=0;return String(hh).padStart(2,'0')+':'+r[2]};
const nowTime24=()=>{const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')};

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
const S={
  date:new Date(), blocks:[],
  tearing:null, tearTimer:null,     /* left-card pulsing */
  bothTimer:null,                   /* right-card both-done badge */
  modal:false,
  timeModal:false, timeModalBid:null,
  pillModal:null,                   /* { pid, bid, side } */
  pillModalEditing:false,
  guideModal:false,
  confirmModal:null,                /* { msg, onOk } */
  movedPillId:null,
  movedTimer:null,
  drag:null, didDrag:false,
};

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
const rand  =a=>a[Math.floor(Math.random()*a.length)];
const genId =()=>'p'+Date.now()+Math.random().toString(36).slice(2,6);
const esc   =s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const findB =id=>S.blocks.find(b=>b.id===id);
const findP =(bid,pid)=>{const b=findB(bid);if(!b)return null;return b.capsules.find(p=>p.id===pid)||b.tablets.find(p=>p.id===pid)||null};
const mkBlocks=d=>{const ds=fmtFull(d);return['아침','점심','저녁'].map((l,i)=>({id:'b'+i+d.getTime(),time:['9:00 AM','12:00 PM','7:00 PM'][i],label:l,date:ds,capsules:[],tablets:[],focusMode:false}))};
const nav=d=>{S.date=d;const sv=StorageService.load(toKey(d));S.blocks=(sv&&Array.isArray(sv)&&sv.length)?sv:mkBlocks(d);render()};
const persist=()=>StorageService.save(toKey(S.date),S.blocks);

/* ═══════════════════════════════════════════════════════
   SVG ICONS
═══════════════════════════════════════════════════════ */
const ico={
  plus:   '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  pencil: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  trash:  '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>',
  trash14:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>',
  check:  '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  check14:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  eye:    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
  eyeOff: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>',
  reset:  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>',
  left:   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
  right:  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
  x:      '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  move:   '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
  help:   '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  clock:  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  cursor: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l7.07 17 2.51-7.39L21 11.07z"/></svg>',
};

/* ═══════════════════════════════════════════════════════
   PILL VISUAL
═══════════════════════════════════════════════════════ */
const pillVis=(color,big)=>{
  const cs=CS[color]||CS.pink;const[l,r]=cs.cap;
  const w=big?72:56,h=big?26:22;
  return '<div class="p-cap" style="width:'+w+'px;height:'+h+'px">'
    +'<div class="p-cl" style="background:linear-gradient(145deg,'+l+' 0%,'+l+' 58%,rgba(0,0,0,.13) 100%)"></div>'
    +'<div class="p-cr" style="background:'+r+'"></div>'
    +'<div class="p-sh"></div></div>';
};

/* ═══════════════════════════════════════════════════════
   PILL ITEM HTML
═══════════════════════════════════════════════════════ */
const pillItem=(pill,bid,side)=>{
  const isR=side==='tablet';
  const cbCls='cb'+(pill.completed?' '+(isR?'o':'g'):'');
  const opacity=pill.completed?'opacity:.5':'';
  const isMoved=S.movedPillId===pill.id;
  return '<div class="pi'+(isMoved?' pill-moved':'')+'" draggable="true"'
    +' data-pid="'+pill.id+'" data-bid="'+bid+'" data-side="'+side+'">'
    +'<button class="'+cbCls+'" data-a="complete" data-pid="'+pill.id+'" data-bid="'+bid+'" data-side="'+side+'">'+(pill.completed?ico.check:'')+'</button>'
    +'<div class="pw" data-pid="'+pill.id+'" data-bid="'+bid+'" data-side="'+side+'">'
      +'<div class="ptip">'
        +'<span class="ptip-txt'+(pill.completed?' done':'')+'">'+esc(pill.text)+'</span>'
        +'<button class="ptip-edit-btn" title="수정" data-a="edit" data-pid="'+pill.id+'" data-bid="'+bid+'" data-side="'+side+'">'+ico.pencil+'</button>'
      +'</div>'
      +'<div class="pv" style="'+opacity+'">'+pillVis(pill.color)+'</div>'
    +'</div>'
    +'<button class="bd" data-a="delete" data-pid="'+pill.id+'" data-bid="'+bid+'" data-side="'+side+'">'+ico.trash+'</button>'
  +'</div>';
};

/* ═══════════════════════════════════════════════════════
   BLOCK HTML
═══════════════════════════════════════════════════════ */
const blockHTML=(b,idx)=>{
  const ds   =fmtFull(S.date);
  const delay=idx*0.06;

  return '<div class="tb" data-bid="'+b.id+'" style="animation-delay:'+delay+'s">'

  +'<div class="card" data-zone="bag" data-bid="'+b.id+'">'
    +'<div class="ci">'
      +'<div class="ch">'
        +'<div class="ch-left">'
          +'<div class="tl-row">'
            +'<button class="t-btn" data-a="edit-time" data-bid="'+b.id+'">'+esc(b.time)+'</button>'
            +'<button class="l-btn" data-a="edit-label" data-bid="'+b.id+'">'+esc(b.label)+'</button>'
          +'</div>'
          +'<div class="c-date">'+ds+'</div>'
        +'</div>'
        +'<div class="ch-actions">'
          +'<button class="del-block-btn" data-a="del-block" data-bid="'+b.id+'" title="시간대 삭제">'+ico.x+'</button>'
        +'</div>'
      +'</div>'
      +'<div class="pl" data-list="capsule" data-bid="'+b.id+'">'
        +b.capsules.map(p=>pillItem(p,b.id,'capsule')).join('')
        /* tearing badge injected by DOM, not by HTML string */
      +'</div>'
      +'<div class="cf"><div id="aa-capsule-'+b.id+'">'
        +'<button class="btn-add" data-a="show-add" data-side="capsule" data-bid="'+b.id+'">'+ico.plus+'할일 추가</button>'
      +'</div></div>'
    +'</div>'
  +'</div>'

  +'<div class="conn"><div class="conn-line"></div><div class="conn-dot"></div></div>'

  +'<div class="card" data-zone="bottle" data-bid="'+b.id+'">'
    +'<div class="fwc" id="fw-'+b.id+'"></div>'
    +'<div class="ci'+(b.focusMode?' blur':'')+'">'
      +'<div class="ch">'
        +'<div class="ch-left">'
          +'<div class="s-lbl">잡생각 보관함</div>'
          +'<div class="c-date">'+ds+'</div>'
        +'</div>'
        +'<div class="ch-actions">'
          +'<button class="f-btn'+(b.focusMode?' on':'')+'" data-a="toggle-focus" data-bid="'+b.id+'">'+(b.focusMode?ico.eye+'보기':ico.eyeOff+'숨기기')+'</button>'
        +'</div>'
      +'</div>'
      +'<div class="pl" data-list="tablet" data-bid="'+b.id+'">'
        +b.tablets.map(p=>pillItem(p,b.id,'tablet')).join('')
      +'</div>'
      +'<div class="cf"><div id="aa-tablet-'+b.id+'">'
        +'<button class="btn-add or" data-a="show-add" data-side="tablet" data-bid="'+b.id+'">'+ico.plus+'잡생각 추가</button>'
      +'</div></div>'
    +'</div>'
    +(b.focusMode
      ?'<div class="fo"><p class="m">메인 약에만 집중하세요!</p><p class="s">잡생각은 잠시 숨겨뒀어요</p>'
        +'<button class="btn-sv" data-a="toggle-focus" data-bid="'+b.id+'">'+ico.eye+'보기</button></div>'
      :'')
  +'</div>'

  +'</div>';
};

/* ═══════════════════════════════════════════════════════
   PILL DETAIL MODAL  (완료 버튼 없음 — 이동·삭제만)
═══════════════════════════════════════════════════════ */
const pillModalHTML=()=>{
  const{pid,bid,side}=S.pillModal;
  const b=findB(bid);if(!b)return'';
  const pill=findP(bid,pid);if(!pill)return'';
  const isRight=side==='tablet';
  const moveLbl=isRight?'메인 약봉투로 이동':'잡생각함으로 이동';

  const bodyContent=S.pillModalEditing
    ?'<input type="text" class="pm-edit-inp" id="pm-inp" value="'+esc(pill.text)+'" placeholder="내용 입력...">'
     +'<button class="btn-ms" data-a="pm-save">저장하기</button>'
    :'<div class="pm-text-box'+(pill.completed?' done':'')+'" data-a="pm-text-click">'+esc(pill.text)+'</div>'
     +'<div class="pm-edit-hint">'+ico.pencil+'<span style="font-size:.72rem;color:var(--muted)">텍스트를 탭하면 수정할 수 있어요</span></div>'
     +'<div class="pm-actions">'
       +'<button class="pm-btn pm-btn-move" data-a="pm-move">'+ico.move+moveLbl+'</button>'
       +'<button class="pm-btn pm-btn-del" data-a="pm-delete">'+ico.trash14+'삭제하기</button>'
     +'</div>';

  return '<div class="mo" id="pmo"><div class="mb" id="pmb">'
    +'<div class="mo-handle"></div>'
    +'<div class="m-hd"><h2>'+(isRight?'잡생각 보관함':'메인 약봉투')+'</h2>'
      +'<button class="btn-mc" data-a="close-pill-modal">'+ico.x+'</button></div>'
    +'<div class="pill-modal-vis">'+pillVis(pill.color,true)+'</div>'
    +'<div class="m-body">'+bodyContent+'</div>'
  +'</div></div>';
};

/* ═══════════════════════════════════════════════════════
   CUSTOM CONFIRM MODAL
═══════════════════════════════════════════════════════ */
const confirmModalHTML=()=>{
  const{msg}=S.confirmModal;
  return '<div class="mo" id="cfmo"><div class="mb confirm-mb" id="cfmb">'
    +'<div class="mo-handle"></div>'
    +'<div class="m-hd"><h2>확인</h2><button class="btn-mc" data-a="confirm-cancel">'+ico.x+'</button></div>'
    +'<p class="confirm-msg">'+esc(msg)+'</p>'
    +'<div class="confirm-row">'
      +'<button class="confirm-cancel" data-a="confirm-cancel">취소</button>'
      +'<button class="confirm-ok" data-a="confirm-ok">삭제</button>'
    +'</div>'
  +'</div></div>';
};

/* ═══════════════════════════════════════════════════════
   GUIDE MODAL
═══════════════════════════════════════════════════════ */
const guideModalHTML=()=>
  '<div class="mo" id="gmo"><div class="mb" id="gmb">'
  +'<div class="mo-handle"></div>'
  +'<div class="m-hd"><h2>이 앱은 어떻게 쓰나요?</h2><button class="btn-mc" data-a="close-guide">'+ico.x+'</button></div>'
  +'<div class="m-body">'
    +'<div class="guide-hero">'
      +'<p style="font-size:.78rem;color:var(--muted);text-align:center;line-height:1.75;max-width:280px">'
        +'완벽하게 하려는 불안감이 당신을 멈추게 둔다면,<br>'
        +'엉망이라도 일단 시작해 보세요.<br>'
        +'집중을 방해하는 완벽에 대한 강박과 잡생각들은<br>'
        +'\'잡생각 보관함\'에 넣어버리세요.'
      +'</p>'
    +'</div>'
    +'<div class="guide-steps">'
      +'<div class="guide-step"><div class="guide-step-ico g">'+ico.plus+'</div>'
        +'<div class="guide-step-txt"><h3>오늘 꼭 할 일을 왼쪽에</h3>'
          +'<p>오른쪽 보관함엔 오늘 반드시 해야 할 핵심 항목만 담아요.</p>'
        +'</div></div>'
      +'<div class="guide-step"><div class="guide-step-ico o">'+ico.cursor+'</div>'
        +'<div class="guide-step-txt"><h3>떠오르는 잡생각은 오른쪽으로</h3>'
          +'<p>작업 중 갑자기 떠오른 아이디어나 당장 하지 않아도 되는 업무는 오른쪽 잡생각함에 드래그 해 격리하세요.</p>'
        +'</div></div>'
      +'<div class="guide-step"><div class="guide-step-ico b">'+ico.eyeOff+'</div>'
        +'<div class="guide-step-txt"><h3>그래도 신경 쓰인다면, 숨겨두세요</h3>'

/* ═══════════════════════════════════════════════════════
   TOOLTIP OVERFLOW FIX
═══════════════════════════════════════════════════════ */
const fixTooltips=()=>{
  document.querySelectorAll('.pw').forEach(pw=>{
    const tip=pw.querySelector('.ptip');if(!tip)return;
    const ci=pw.closest('.ci');if(!ci)return;
    const pwR=pw.getBoundingClientRect(),ciR=ci.getBoundingClientRect();
    const tipW=tip.offsetWidth||160,pwW=pw.offsetWidth||56;
    let left=(pwW-tipW)/2;
    const pwInCiL=pwR.left-ciR.left,mg=8;
    if(pwInCiL+left<mg)                        left=mg-pwInCiL;
    else if(pwInCiL+left+tipW>ciR.width-mg)    left=ciR.width-mg-tipW-pwInCiL;
    tip.style.left=left+'px';
    tip.style.setProperty('--arr-left',Math.max(12,Math.min(tipW-12,pwW/2-left))+'px');
  });
};

/* ═══════════════════════════════════════════════════════
   COMPLETE — DOM surgery only, no full re-render
═══════════════════════════════════════════════════════ */
const doComplete=(bid,pid,side)=>{
  const b=findB(bid);if(!b)return;
  const pL0=b.capsules.length>0&&b.capsules.every(p=>p.completed);
  const pB0=pL0&&b.tablets.length>0&&b.tablets.every(p=>p.completed);

  /* 1. Mutate data */
  const list=side==='capsule'?b.capsules:b.tablets;
  const pill=list.find(p=>p.id===pid);if(!pill)return;
  pill.completed=!pill.completed;
  persist();

  /* 2. Patch the specific .pi without touching anything else */
  const piEl=document.querySelector('.pi[data-pid="'+pid+'"]');
  if(piEl){
    const isR=side==='tablet';
    const cbEl=piEl.querySelector('.cb');
    const pvEl=piEl.querySelector('.pv');
    const ptipTxt=piEl.querySelector('.ptip-txt');

    if(pill.completed){
      cbEl.className='cb '+(isR?'o':'g');
      cbEl.innerHTML=ico.check;
      pvEl.style.opacity='.5';
      if(ptipTxt)ptipTxt.classList.add('done');
    } else {
      cbEl.className='cb';
      cbEl.innerHTML='';
      pvEl.style.opacity='';
      if(ptipTxt)ptipTxt.classList.remove('done');
    }
  }

  /* 3. 완료 상태 평가 */
  const nL = b.capsules.length > 0 && b.capsules.every(p => p.completed);  /* 좌측 전체 완료 */
  const nR = b.tablets.length  > 0 && b.tablets.every(p  => p.completed);  /* 우측 전체 완료 */
  const nB = nL && nR;  /* 양쪽 모두 완료 (엄격 조건) */

  /* 좌측 완료 → "엉망진창 완료 ✓" */
  if(nL && !pL0){
    S.tearing=bid;
    clearTimeout(S.tearTimer);
    showTearBadge(bid);
    S.tearTimer=setTimeout(()=>{
      S.tearing=null;
      removeTearBadge(bid);
    },1100);
  } else if(!nL && S.tearing===bid){
    S.tearing=null;
    clearTimeout(S.tearTimer);
    removeTearBadge(bid);
  }

  /* 양쪽 완료 (좌측 AND 우측 모두) → "진짜 엉망진창 완료 🎉" */
  if(nB && !pB0){
    showBothBadge(bid);
    clearTimeout(S.bothTimer);
    S.bothTimer=setTimeout(()=>removeBothBadge(bid), 1100);
  }
};

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
const doEdit=(bid,pid,side)=>{
  const pw=document.querySelector('.pw[data-pid="'+pid+'"][data-bid="'+bid+'"]');if(!pw)return;
  const tip=pw.querySelector('.ptip');const span=tip&&tip.querySelector('.ptip-txt');
  if(!tip||!span)return;
  const b=findB(bid);if(!b)return;
  const list=side==='capsule'?b.capsules:b.tablets;
  const pill=list.find(p=>p.id===pid);if(!pill)return;
  pw.classList.add('tip-open');
  const editBtn=tip.querySelector('.ptip-edit-btn');if(editBtn)editBtn.style.display='none';
  const inp=document.createElement('input');
  inp.type='text';inp.value=pill.text;inp.className='ptip-inp';
  span.replaceWith(inp);inp.focus();inp.select();
  let done=false;
  const save=()=>{if(done)return;done=true;const t=inp.value.trim();if(t&&t!==pill.text){pill.text=t;persist();}pw.classList.remove('tip-open');render();};
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')save();if(e.key==='Escape'){done=true;pw.classList.remove('tip-open');render();}});
  inp.addEventListener('blur',save);
};

const doDelete=(bid,pid,side)=>{
  const b=findB(bid);if(!b)return;
  if(side==='capsule')b.capsules=b.capsules.filter(p=>p.id!==pid);
  else                b.tablets =b.tablets.filter(p=>p.id!==pid);
  persist();render();
};

const doFocus=bid=>{const b=findB(bid);if(b){b.focusMode=!b.focusMode;persist();render();}};

const doEditTime=bid=>{S.timeModalBid=bid;S.timeModal=true;render();};
const doSaveTime=()=>{
  const tmt=document.getElementById('tmt');const b=findB(S.timeModalBid);
  if(b&&tmt&&tmt.value){b.time=to12h(tmt.value);persist();}
  S.timeModal=false;S.timeModalBid=null;render();
};

const doEditLabel=bid=>{
  const btn=document.querySelector('.l-btn[data-bid="'+bid+'"]');if(!btn)return;
  const b=findB(bid);if(!b)return;
  const inp=document.createElement('input');
  inp.type='text';inp.value=b.label;inp.className='l-inp';
  btn.replaceWith(inp);inp.focus();inp.select();
  let done=false;
  const sv=()=>{if(done)return;done=true;const t=inp.value.trim();if(t){b.label=t;persist();}render();};
  inp.addEventListener('blur',sv);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')sv();if(e.key==='Escape'){done=true;render();}});
};

const doDelBlock=bid=>{
  S.confirmModal={
    msg:'이 시간대를 삭제할까요?\n포함된 할 일도 모두 삭제됩니다.',
    onOk:()=>{
      S.blocks=S.blocks.filter(b=>b.id!==bid);
      if(S.tearing===bid){S.tearing=null;clearTimeout(S.tearTimer);}
      S.confirmModal=null;persist();render();
    }
  };render();
};

const doShowAdd=(bid,side)=>{
  const aId='aa-'+side+'-'+bid;const area=document.getElementById(aId);if(!area)return;
  const isM=side==='capsule';
  area.innerHTML='<div class="add-form">'
    +'<input type="text" class="add-in'+(isM?'':' or')+'" placeholder="'+(isM?'할일':'잡생각')+' 입력..." id="ai-'+bid+'-'+side+'">'
    +'<button class="btn-ac'+(isM?'':' or')+'" id="ac-'+bid+'-'+side+'">추가</button>'
    +'<button class="btn-an" id="an-'+bid+'-'+side+'">취소</button>'
  +'</div>';
  const inp=document.getElementById('ai-'+bid+'-'+side);if(!inp)return;
  inp.focus();
  const resetA=()=>{area.innerHTML='<button class="btn-add'+(isM?'':' or')+'" data-a="show-add" data-side="'+side+'" data-bid="'+bid+'">'+ico.plus+(isM?'할일':'잡생각')+' 추가</button>';};
  const doAdd=()=>{
    const text=inp.value.trim();if(!text){resetA();return;}
    const b=findB(bid);if(!b)return;
    const pill={id:genId(),text,shape:'capsule',color:rand(COLORS),completed:false,type:side};
    if(side==='capsule')b.capsules.push(pill);else b.tablets.push(pill);
    persist();render();
  };
  document.getElementById('ac-'+bid+'-'+side).addEventListener('click',doAdd);
  document.getElementById('an-'+bid+'-'+side).addEventListener('click',resetA);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();if(e.key==='Escape')resetA();});

const doAddBlock=()=>{
  const mt=document.getElementById('mt'),ml=document.getElementById('ml');
  if(!mt||!ml)return;
  const label=ml.value.trim();if(!label)return;
  const block={id:'b'+Date.now(),time:to12h(mt.value||nowTime24()),label,date:fmtFull(S.date),capsules:[],tablets:[],focusMode:false};
  S.blocks.push(block);S.modal=false;persist();render();
};

/* pill modal */
const openPillModal=(pid,bid,side)=>{S.pillModal={pid,bid,side};S.pillModalEditing=false;render();};
const closePillModal=()=>{S.pillModal=null;S.pillModalEditing=false;render();};

const doPmSave=()=>{
  const inp=document.getElementById('pm-inp');if(!inp)return;
  const t=inp.value.trim();if(!t)return;
  const{pid,bid,side}=S.pillModal;
  const b=findB(bid);if(!b)return;
  const list=side==='capsule'?b.capsules:b.tablets;
  const pill=list.find(p=>p.id===pid);if(!pill)return;
  pill.text=t;persist();S.pillModalEditing=false;render();
};

const doPmMove=()=>{
  const{pid,bid,side}=S.pillModal;
  const b=findB(bid);if(!b)return;
  const sl=side==='capsule'?b.capsules:b.tablets;
  const idx=sl.findIndex(p=>p.id===pid);if(idx===-1)return;
  const[pill]=sl.splice(idx,1);
  const newSide=side==='capsule'?'tablet':'capsule';
  pill.type=newSide;
  if(newSide==='capsule')b.capsules.push(pill);else b.tablets.push(pill);
  S.pillModal=null;S.pillModalEditing=false;
  S.movedPillId=pid;
  clearTimeout(S.movedTimer);
  persist();render();
  requestAnimationFrame(()=>{
    const pw=document.querySelector('.pw[data-pid="'+pid+'"]');
    if(!pw)return;
    const badge=document.createElement('div');
    badge.className='moved-badge';badge.textContent='이동완료';
    pw.appendChild(badge);
  });
  S.movedTimer=setTimeout(()=>{
    S.movedPillId=null;
    const badge=document.querySelector('.moved-badge');if(badge)badge.remove();
  },2200);
};

const doPmDelete=()=>{
  const{pid,bid,side}=S.pillModal;
  closePillModal();
  doDelete(bid,pid,side);
};

/* ═══════════════════════════════════════════════════════
   DRAG & DROP
═══════════════════════════════════════════════════════ */
document.addEventListener('mousedown',()=>{S.didDrag=false;});
document.addEventListener('touchstart',()=>{S.didDrag=false;},{passive:true});
document.addEventListener('dragstart',e=>{
  if(e.target.closest('button')||e.target.closest('input')){e.preventDefault();return;}
  const row=e.target.closest('.pi');if(!row)return;
  S.didDrag=true;
  S.drag={pid:row.dataset.pid,sbid:row.dataset.bid,sside:row.dataset.side};
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>row.classList.add('dragging'),0);
});
document.addEventListener('dragend',()=>{
  document.querySelectorAll('.pi.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.card.dg,.card.do').forEach(el=>el.classList.remove('dg','do'));
});
document.addEventListener('dragover',e=>{
  const zone=e.target.closest('[data-zone]');if(!zone||!S.drag)return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.card.dg,.card.do').forEach(el=>el.classList.remove('dg','do'));
  zone.classList.add(zone.dataset.zone==='bag'?'dg':'do');
});
document.addEventListener('dragleave',e=>{
  const zone=e.target.closest('[data-zone]');if(!zone)return;
  if(!zone.contains(e.relatedTarget))zone.classList.remove('dg','do');
});
document.addEventListener('drop',e=>{
  e.preventDefault();
  const zone=e.target.closest('[data-zone]');if(!zone||!S.drag)return;
  zone.classList.remove('dg','do');
  const{pid,sbid,sside}=S.drag;S.drag=null;
  const tbid=zone.dataset.bid,tzone=zone.dataset.zone;
  const tside=tzone==='bag'?'capsule':'tablet';
  if(sbid===tbid&&sside===tside)return;
  const sb=findB(sbid);if(!sb)return;
  const sl=sside==='capsule'?sb.capsules:sb.tablets;
  const idx=sl.findIndex(p=>p.id===pid);if(idx===-1)return;
  const[pill]=sl.splice(idx,1);pill.type=tside;
  const tb=findB(tbid);
  if(!tb){sl.splice(idx,0,pill);return;}
  if(tside==='capsule')tb.capsules.push(pill);else tb.tablets.push(pill);
  persist();render();
});

/* ═══════════════════════════════════════════════════════
   CLICK DELEGATION
═══════════════════════════════════════════════════════ */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-a]');if(!el)return;
  const a=el.dataset.a,bid=el.dataset.bid,pid=el.dataset.pid,side=el.dataset.side;
  switch(a){
    case 'prev':{const d=new Date(S.date);d.setDate(d.getDate()-1);nav(d);break;}
    case 'next':{const d=new Date(S.date);d.setDate(d.getDate()+1);nav(d);break;}
    case 'complete':         doComplete(bid,pid,side);break;
    case 'edit':             doEdit(bid,pid,side);break;
    case 'delete':           doDelete(bid,pid,side);break;
    case 'toggle-focus':     doFocus(bid);break;
    case 'edit-time':        doEditTime(bid);break;
    case 'close-time-modal': S.timeModal=false;S.timeModalBid=null;render();break;
    case 'save-time':        doSaveTime();break;
    case 'edit-label':       doEditLabel(bid);break;
    case 'del-block':        doDelBlock(bid);break;
    case 'show-add':         doShowAdd(bid,side);break;
    case 'show-modal':       S.modal=true;render();break;
    case 'close-modal':      S.modal=false;render();break;
    case 'add-block':        doAddBlock();break;
    /* pill modal */
    case 'pm-text-click':    S.pillModalEditing=true;render();break;
    case 'pm-save':          doPmSave();break;
    case 'pm-move':          doPmMove();break;
    case 'pm-delete':        doPmDelete();break;
    case 'close-pill-modal': closePillModal();break;
    /* confirm */
    case 'confirm-ok':       if(S.confirmModal)S.confirmModal.onOk();break;
    case 'confirm-cancel':   S.confirmModal=null;render();break;
    /* guide */
    case 'show-guide':       S.guideModal=true;render();break;
    case 'close-guide':      S.guideModal=false;render();break;
    case 'reset':
      S.confirmModal={
        msg:'오늘 데이터를 초기화할까요?',
        onOk:()=>{StorageService.remove(toKey(S.date));S.blocks=mkBlocks(S.date);S.tearing=null;clearTimeout(S.tearTimer);S.confirmModal=null;persist();render();}
      };
      render();break;
  }
});

/* pill click → detail modal */
document.addEventListener('click',e=>{
  if(S.didDrag)return;
  if(e.target.closest('[data-a]'))return;
  const pw=e.target.closest('.pw');if(!pw)return;
  const pid=pw.dataset.pid,bid=pw.dataset.bid,side=pw.dataset.side;
  if(pid&&bid&&side)openPillModal(pid,bid,side);
});

/* ESC */
document.addEventListener('keydown',e=>{
  if(e.key!=='Escape')return;
  if(S.confirmModal)  {S.confirmModal=null;render();return;}
  if(S.pillModal)     {closePillModal();return;}
  if(S.guideModal)    {S.guideModal=false;render();return;}
  if(S.timeModal)     {S.timeModal=false;S.timeModalBid=null;render();return;}
  if(S.modal)         {S.modal=false;render();return;}
});

window.addEventListener('resize',fixTooltips);

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
nav(new Date());
</script>
</body>
</html>
